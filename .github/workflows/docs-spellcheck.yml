name: Docs Spell Check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'cspell.json'
      - 'docs/package.json'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'cspell.json'
      - 'docs/package.json'
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-spellcheck"
  cancel-in-progress: true

jobs:
  spellcheck:
    name: Spell check docs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd docs
          npm install --no-audit --no-fund

      - name: Run spell check
        run: |
          cd docs
          npm run docs:spellcheck

      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::docs 拼写检查失败，请运行 \`cd docs && npm run docs:spellcheck\` 本地修复或更新 cspell.json 词典"
