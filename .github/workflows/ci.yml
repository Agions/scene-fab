name: CI

# main 分支推送：全量检查（lint + type + test + docs build）
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: |
          ruff check src/voxplore/ tests/ --output-format=github \
            --ignore E501,F401 \
            --ignore E402 \
            --ignore F541,F811 \
            --ignore N802 \
            --ignore B904,B007 \
            --ignore SIM102,SIM108,SIM118 \
            --ignore W292,E401,E701 \
            --ignore N806,N812 \
            --ignore SIM103,SIM105,SIM110,SIM117 \
            --ignore N812

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: ruff check src/voxplore/ --select F,E,N,W,B,C4,SIM --ignore E501,F401,B904,N806,N803,SIM102,SIM103,SIM105,SIM108,SIM110,SIM117,SIM118,N812,W292,N802,E701,B007,B027,E402,B905,SIM113,C408,N815,N817,SIM115,B024

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
      - run: pip install -e ".[all,dev]"
      # PySide6 相关测试需要 GUI 环境，CI 中跳过
      - run: |
          pytest tests/ -v --tb=short --cov=voxplore --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_project_manager.py \
            --ignore=tests/test_application.py \
            --ignore=tests/test_ui_components.py \
            --ignore=tests/test_page_loader.py \
            --ignore=tests/test_project_settings_manager.py \
            --ignore=tests/test_project_version_manager.py \
            --ignore=tests/test_icon_manager.py \
            --ignore=tests/test_project_template_manager.py
      - uses: actions/upload-artifact@v4
        if: matrix.python == '3.11'
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 5
