name: CI

# main 分支推送：全量检查（lint + type + test + docs build）
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'
      - run: uv sync --extra dev --frozen
      - run: uv run ruff check src/scenefab/ tests/ --output-format=github

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'
      - run: uv sync --extra dev --frozen
      # Use config from pyproject.toml (which already ignores E501/F401/F811)
      - run: uv run ruff check src/scenefab/
      - run: uv run mypy src/scenefab/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # onnxruntime (via faster-whisper) only ships wheels for Python 3.11+
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'
      - run: uv sync --extra all --extra dev --frozen
      # PySide6 相关测试需要 GUI 环境，CI 中跳过
      - run: |
          uv run pytest tests/ -v --tb=short --cov=src/scenefab --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_project_manager.py \
            --ignore=tests/test_application.py \
            --ignore=tests/test_ui_components.py \
            --ignore=tests/test_page_loader.py \
            --ignore=tests/test_project_settings_manager.py \
            --ignore=tests/test_project_version_manager.py \
            --ignore=tests/test_icon_manager.py \
            --ignore=tests/test_project_template_manager.py
      - uses: actions/upload-artifact@v4
        if: matrix.python == '3.11'
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 5