name: PR Check

# PR 事件：快速验证（lint + test，不构建 docs）
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: |
          ruff check src/voxplore/ tests/ --output-format=github \
            --ignore E501,F401 \
            --ignore E402 \
            --ignore F541,F811 \
            --ignore N802 \
            --ignore B904,B007 \
            --ignore SIM102,SIM103,SIM105,SIM108,SIM110,SIM117,SIM118 \
            --ignore W292,E401,E701 \
            --ignore N806,N812

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -e ".[all,dev]"
      - run: pytest tests/ -v --tb=short --cov=voxplore --cov-report=term-missing --ignore=tests/test_project_manager.py --ignore=tests/test_application.py --ignore=tests/test_ui_components.py --ignore=tests/test_page_loader.py --ignore=tests/test_project_settings_manager.py --ignore=tests/test_project_version_manager.py --ignore=tests/test_icon_manager.py --ignore=tests/test_project_template_manager.py
