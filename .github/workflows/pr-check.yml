name: PR Check

# PR 事件：快速验证（lint + test，不构建 docs）
on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'
      - run: uv sync --extra dev --frozen
      - run: uv run ruff check src/scenefab/ tests/ --output-format=github

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'
      - run: uv sync --extra all --extra dev --frozen
      - run: |
          uv run pytest tests/ -v --tb=short --cov=src/scenefab --cov-report=term-missing \
            --ignore=tests/test_project_manager.py \
            --ignore=tests/test_application.py \
            --ignore=tests/test_ui_components.py \
            --ignore=tests/test_page_loader.py \
            --ignore=tests/test_project_settings_manager.py \
            --ignore=tests/test_project_version_manager.py \
            --ignore=tests/test_project_template_manager.py