# lychee config for scene-fab docs external link checker
# Used by .github/workflows/docs-external-links.yml
#
# Why these settings:
#   - remap: convert root-relative /guide/* links to internal.invalid placeholders
#     so lychee doesn't try to resolve them as filesystem paths (which would
#     require --root-dir + an actual docs build). Internal links are checked
#     separately by docs-links.yml.
#   - exclude internal.invalid: skip the remapped placeholders (no real check)
#   - exclude self: avoid checking our own GitHub repo
#   - accept 4xx: tolerate anti-bot responses (DeepSeek, Cloudflare-walled sites)
#   - retries: handle transient network failures / rate limits
#   - 30s timeout: bumped from lychee default 20s for slow CDNs

# Acceptable HTTP status codes (in addition to 2xx/3xx)
# 4xx = "exists but anti-bot" (DeepSeek platform, Cloudflare-walled sites)
accept = ["200..299", "300..399", "400..499"]

# Remap root-relative links to placeholder host so they parse as valid URLs
# without being GET'd. lychee format: "<pattern> <replacement>" as a string list.
# Pattern ^/ matches any link starting with /, remapped to https://internal.invalid/
# (excluded below — no real network call).
remap = [
  "^/ https://internal.invalid/",
]

# Don't check these
exclude = [
  "github.com/Agions/scene-fab",  # self
  "internal.invalid",             # remapped placeholders for internal links
  "mailto:",
  "^#",                           # pure anchor links
]

# Retry up to 3 times on transient failures
max_retries = 3

# Per-request timeout in seconds
timeout = 30

# Concurrent requests (lychee default is 32; lower for CI politeness)
max_concurrency = 8

# Don't follow redirects to mailto:/tel:/javascript:
exclude_link_local = false
exclude_loopback = true

# Output format
format = "markdown"
output = ".lychee/out.md"
