# 日志配置

[loggers]
keys=root,app,ai,services

[handlers]
keys=consoleHandler,fileHandler,errorHandler

[formatters]
keys=simpleFormatter,detailedFormatter

# Root logger
[logger_root]
level=INFO
handlers=consoleHandler

# Application logger
[logger_app]
level=INFO
handlers=consoleHandler,fileHandler
qualname=app
propagate=0

# AI services logger
[logger_ai]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=app.services.ai
propagate=0

# Services logger
[logger_services]
level=INFO
handlers=fileHandler
qualname=app.services
propagate=0

# Console handler
[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

# File handler
[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailedFormatter
args=('logs/clipflow.log', 'a', 10485760, 5, 'utf-8')

# Error handler
[handler_errorHandler]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailedFormatter
args=('logs/error.log', 'a', 10485760, 3, 'utf-8')

# Simple formatter
[formatter_simpleFormatter]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

# Detailed formatter
[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
