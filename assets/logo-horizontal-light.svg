<?xml version="1.0" encoding="UTF-8"?>
<!--
  SceneFab — Horizontal Logo (LIGHT theme variant)
  与 dark 版差异: 底色透明 (适配 light 主题背景), 字色改深色。
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 160"
     role="img"
     aria-label="SceneFab — AI 影视解说视频创作工具 (light)">
  <title>SceneFab</title>
  <defs>
    <linearGradient id="bgHLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="brandHLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="hiHLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="coreHLight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="glowHLight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== Logo mark ===== -->
  <g transform="translate(16 16)">
    <rect width="128" height="128" rx="28" fill="url(#bgHLight)"/>
    <rect x="0.5" y="0.5" width="127" height="127" rx="27.5" fill="none"
          stroke="url(#brandHLight)" stroke-width="0.6" opacity="0.4"/>

    <circle cx="64" cy="64" r="46" fill="none"
            stroke="url(#brandHLight)" stroke-width="1.4"
            stroke-dasharray="2 4" opacity="0.65"/>

    <circle cx="64" cy="64" r="34" fill="none"
            stroke="url(#brandHLight)" stroke-width="0.8" opacity="0.7"/>

    <g fill="url(#hiHLight)">
      <circle cx="64" cy="18"  r="1.4"/>
      <circle cx="110" cy="64" r="1.4"/>
      <circle cx="64" cy="110" r="1.4"/>
      <circle cx="18" cy="64"  r="1.4"/>
    </g>

    <g transform="translate(64 64)">
      <circle r="22" fill="#f8fafc"/>
      <circle r="22" fill="none" stroke="url(#brandHLight)" stroke-width="0.8" opacity="0.65"/>
      <path d="M -14 0 A 14 14 0 0 1 0 -14" fill="none"
            stroke="url(#hiHLight)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
      <path d="M 14 0 A 14 14 0 0 1 0 14" fill="none"
            stroke="url(#hiHLight)" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
      <path d="M -5 -8 L 9 0 L -5 8 Z" fill="url(#coreHLight)" filter="url(#glowHLight)"/>
    </g>

    <path d="M 98 30 L 99.5 33 L 103 34.5 L 99.5 36 L 98 39 L 96.5 36 L 93 34.5 L 96.5 33 Z"
          fill="url(#hiHLight)" opacity="0.95"/>
    <path d="M 105 44 L 105.7 45.5 L 107.2 46.2 L 105.7 46.9 L 105 48.4 L 104.3 46.9 L 102.8 46.2 L 104.3 45.5 Z"
          fill="#7c3aed" opacity="0.75"/>
  </g>

  <!-- ===== Wordmark (深色字 + 浅色副标) ===== -->
  <g transform="translate(168 0)">
    <text x="0" y="78"
          font-family="Inter, 'SF Pro Display', 'Helvetica Neue', system-ui, -apple-system, 'PingFang SC', sans-serif"
          font-size="50"
          font-weight="800"
          fill="#0f172a"
          letter-spacing="-1.8">Scene<tspan fill="url(#brandHLight)">Fab</tspan></text>

    <text x="2" y="108"
          font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', system-ui, sans-serif"
          font-size="14"
          font-weight="500"
          fill="#64748b"
          letter-spacing="2.4">AI 影视解说视频创作工具</text>
  </g>
</svg>