<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     role="img"
     aria-label="SceneFab">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="240" height="240" rx="48" stroke="url(#accent)" stroke-width="1.5" opacity="0.2"/>

  <!-- Viewfinder corners -->
  <g transform="translate(128, 118)">
    <!-- Top-left -->
    <path d="M-40 -40 L-40 -30 M-40 -40 L-30 -40" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <!-- Top-right -->
    <path d="M40 -40 L40 -30 M40 -40 L30 -40" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <!-- Bottom-left -->
    <path d="M-40 40 L-40 30 M-40 40 L-30 40" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <!-- Bottom-right -->
    <path d="M40 40 L40 30 M40 40 L30 40" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Play button -->
  <g filter="url(#glow)">
    <path d="M112 88 L112 168 L176 128 Z" fill="url(#play)" opacity="0.9"/>
  </g>

  <!-- AI sparkle -->
  <g transform="translate(200, 78)">
    <path d="M0 -10 L3 -3 L10 0 L3 3 L0 10 L-3 3 L-10 0 L-3 -3 Z" fill="#22d3ee" opacity="0.85"/>
  </g>

  <!-- Secondary sparkle -->
  <g transform="translate(215, 98) scale(0.5)">
    <path d="M0 -10 L3 -3 L10 0 L3 3 L0 10 L-3 3 L-10 0 L-3 -3 Z" fill="#a78bfa" opacity="0.6"/>
  </g>

  <!-- SF monogram -->
  <text x="128" y="218" text-anchor="middle"
        font-family="Inter, SF Pro Display, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="36" fill="url(#accent)" letter-spacing="6">SF</text>
</svg>
