<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     role="img"
     aria-label="SceneFab">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#1B1742"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Outer ring (film/loop) -->
  <circle cx="128" cy="122" r="72" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.35"/>

  <!-- Film ticks — 4 corners, minimal -->
  <g stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <!-- Top -->
    <line x1="128" y1="46" x2="128" y2="54"/>
    <!-- Bottom -->
    <line x1="128" y1="190" x2="128" y2="198"/>
    <!-- Left -->
    <line x1="52" y1="122" x2="60" y2="122"/>
    <!-- Right -->
    <line x1="196" y1="122" x2="204" y2="122"/>
  </g>

  <!-- Inner ring (story/core) -->
  <circle cx="128" cy="122" r="48" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.55"/>

  <!-- Center disc -->
  <circle cx="128" cy="122" r="32" fill="#0F0C29" opacity="0.95"/>

  <!-- Play triangle -->
  <path d="M 118 106 L 142 122 L 118 138 Z" fill="url(#accent)"/>

  <!-- Bottom tagline arc (optional subtle text path) -->
</svg>
