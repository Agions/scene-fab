<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     role="img"
     aria-label="SceneFab">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#1B1742"/>
    </linearGradient>
    <linearGradient id="accentF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bgF)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="30" r="20" fill="none" stroke="url(#accentF)" stroke-width="1.5" opacity="0.35"/>

  <!-- Film ticks -->
  <g stroke="url(#accentF)" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
    <line x1="32" y1="8" x2="32" y2="12"/>
    <line x1="32" y1="48" x2="32" y2="52"/>
    <line x1="10" y1="30" x2="14" y2="30"/>
    <line x1="50" y1="30" x2="54" y2="30"/>
  </g>

  <!-- Inner ring -->
  <circle cx="32" cy="30" r="13" fill="none" stroke="url(#accentF)" stroke-width="1.2" opacity="0.55"/>

  <!-- Center disc -->
  <circle cx="32" cy="30" r="9" fill="#0F0C29" opacity="0.95"/>

  <!-- Play triangle -->
  <path d="M 28 24 L 38 30 L 28 36 Z" fill="url(#accentF)"/>
</svg>
