<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 160"
     role="img"
     aria-label="SceneFab - AI 影视解说视频创作工具">
  <defs>
    <linearGradient id="bgH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="100%" stop-color="#1B1742"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D6E"/>
    </linearGradient>
  </defs>

  <!-- Logo mark (left, 128x128 centered in 160 height) -->
  <g transform="translate(16 16)">
    <rect width="128" height="128" rx="28" fill="url(#bgH)"/>

    <!-- Outer ring -->
    <circle cx="64" cy="61" r="44" fill="none" stroke="url(#accentH)" stroke-width="1.8" opacity="0.35"/>

    <!-- Film ticks -->
    <g stroke="url(#accentH)" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
      <line x1="64" y1="14" x2="64" y2="20"/>
      <line x1="64" y1="102" x2="64" y2="108"/>
      <line x1="17" y1="61" x2="23" y2="61"/>
      <line x1="105" y1="61" x2="111" y2="61"/>
    </g>

    <!-- Inner ring -->
    <circle cx="64" cy="61" r="30" fill="none" stroke="url(#accentH)" stroke-width="1.5" opacity="0.55"/>

    <!-- Center disc -->
    <circle cx="64" cy="61" r="20" fill="#0F0C29" opacity="0.95"/>

    <!-- Play triangle -->
    <path d="M 57 50 L 73 61 L 57 72 Z" fill="url(#accentH)"/>
  </g>

  <!-- Wordmark (right) -->
  <g transform="translate(168 0)">
    <text x="0" y="68"
          font-family="Inter, 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="48"
          font-weight="800"
          fill="#FFFFFF"
          letter-spacing="-2">Scene<tspan fill="url(#accentH)">Fab</tspan></text>
    <text x="2" y="100"
          font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
          font-size="14"
          font-weight="600"
          fill="url(#accentH)"
          letter-spacing="3.2"
          opacity="0.85">AI 影视解说视频创作工具</text>
  </g>
</svg>
