<?xml version="1.0" encoding="UTF-8"?>
<!--
  SceneFab — Logo Mark (LIGHT theme variant)
  用于 VitePress light 主题 + 浅色场景。
  与 dark 版差异: 底色从深空黑 → 纯净白, 描边保留, Play/光环配色一致。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SceneFab mark (light)">
  <title>SceneFab</title>
  <defs>
    <linearGradient id="bgMarkLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="brandMarkLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="hiMarkLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="coreMarkLight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="glowMarkLight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clipMarkLight">
      <rect width="256" height="256" rx="56" ry="56"/>
    </clipPath>
  </defs>

  <!-- 1. 底板: 浅色纯净白 -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bgMarkLight)"/>

  <!-- 2. 内描边 -->
  <rect x="1" y="1" width="254" height="254" rx="55" ry="55"
        fill="none" stroke="url(#brandMarkLight)" stroke-width="1" opacity="0.35"/>

  <!-- 3. 外环 (虚线, 流水线轨道) -->
  <g clip-path="url(#clipMarkLight)" opacity="0.95">
    <circle cx="128" cy="128" r="92"
            fill="none" stroke="url(#brandMarkLight)" stroke-width="2.5"
            stroke-dasharray="3 6" opacity="0.65"/>

    <circle cx="128" cy="128" r="68"
            fill="none" stroke="url(#brandMarkLight)" stroke-width="1.5" opacity="0.7"/>

    <g fill="url(#hiMarkLight)">
      <circle cx="128" cy="36"  r="2.5"/>
      <circle cx="220" cy="128" r="2.5"/>
      <circle cx="128" cy="220" r="2.5"/>
      <circle cx="36"  cy="128" r="2.5"/>
    </g>
  </g>

  <!-- 4. 内核盘 -->
  <g transform="translate(128 128)">
    <!-- 中心圆盘: 浅色主题下用淡灰做对比 (不能纯白,否则 Play 看不清) -->
    <circle r="44" fill="#f8fafc"/>
    <circle r="44" fill="none" stroke="url(#brandMarkLight)" stroke-width="1.5" opacity="0.7"/>

    <!-- AI 弧线 -->
    <path d="M -28 0 A 28 28 0 0 1 0 -28" fill="none"
          stroke="url(#hiMarkLight)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <path d="M 28 0 A 28 28 0 0 1 0 28" fill="none"
          stroke="url(#hiMarkLight)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

    <!-- 中心 Play 三角 -->
    <path d="M -10 -16 L 18 0 L -10 16 Z" fill="url(#coreMarkLight)" filter="url(#glowMarkLight)"/>
  </g>

  <!-- 5. Sparkle -->
  <g fill="url(#hiMarkLight)" opacity="0.95">
    <path d="M 196 60 L 199 67 L 206 70 L 199 73 L 196 80 L 193 73 L 186 70 L 193 67 Z"/>
  </g>
  <g fill="#7c3aed" opacity="0.7">
    <path d="M 210 88 L 211.5 92 L 215.5 93.5 L 211.5 95 L 210 99 L 208.5 95 L 204.5 93.5 L 208.5 92 Z"/>
  </g>
</svg>