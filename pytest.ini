# Voxplore Pytest 配置

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
norecursedirs = tests/_legacy .venv .git dist build *.egg-info *_ascm_temp
asyncio_mode = auto

# 测试标记
markers =
    integration: 需要真实 API 密钥的集成测试
    slow: 运行较慢的测试
    unit: 单元测试
    integration: 集成测试（需要真实 API 调用）
