<?xml version="1.0" encoding="UTF-8"?>
<!-- 模块化 / 拼图 (module / modular blocks) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="brandCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- 4 个模块块 (主结构 cyan, 右下角 violet 强调) -->
  <rect x="3" y="3" width="7" height="7" rx="1.5"
        stroke="url(#brandCyan)" stroke-width="1.75"/>
  <rect x="14" y="3" width="7" height="7" rx="1.5"
        stroke="url(#brandCyan)" stroke-width="1.75"/>
  <rect x="3" y="14" width="7" height="7" rx="1.5"
        stroke="url(#brandCyan)" stroke-width="1.75"/>
  <!-- 第 4 块: violet 强调 (代表 AI 模块) -->
  <rect x="14" y="14" width="7" height="7" rx="1.5"
        stroke="#a855f7" stroke-width="1.75" opacity="0.85"/>
  <!-- 中心连接线 (虚线, 暗示模块组合) -->
  <line x1="10" y1="6.5" x2="14" y2="6.5"
        stroke="url(#brandCyan)" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="10" y1="17.5" x2="14" y2="17.5"
        stroke="#a855f7" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="6.5" y1="10" x2="6.5" y2="14"
        stroke="url(#brandCyan)" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <line x1="17.5" y1="10" x2="17.5" y2="14"
        stroke="#a855f7" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
</svg>