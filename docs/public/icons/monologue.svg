<?xml version="1.0" encoding="UTF-8"?>
<!-- 解说 / 麦克风 (narration / monologue) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="brandCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- 麦克风主体 -->
  <rect x="9" y="2" width="6" height="11" rx="3"
        stroke="url(#brandCyan)" stroke-width="1.75"/>
  <!-- 麦克风弧线 (桌面支架) -->
  <path d="M 5 11 V 12 A 7 7 0 0 0 19 12 V 11"
        stroke="url(#brandCyan)" stroke-width="1.75" stroke-linecap="round"/>
  <!-- 杆 -->
  <line x1="12" y1="19" x2="12" y2="22"
        stroke="url(#brandCyan)" stroke-width="1.75" stroke-linecap="round"/>
  <!-- 底座 -->
  <line x1="8" y1="22" x2="16" y2="22"
        stroke="url(#brandCyan)" stroke-width="1.75" stroke-linecap="round"/>
  <!-- 声波 (左侧, violet 强调) -->
  <path d="M 2 12 Q 3.5 12 3.5 10.5 Q 3.5 9 2 9"
        stroke="#a855f7" stroke-width="1.25" stroke-linecap="round" opacity="0.7"/>
  <!-- 声波 (右侧) -->
  <path d="M 22 12 Q 20.5 12 20.5 10.5 Q 20.5 9 22 9"
        stroke="#a855f7" stroke-width="1.25" stroke-linecap="round" opacity="0.7"/>
</svg>