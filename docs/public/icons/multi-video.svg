<?xml version="1.0" encoding="UTF-8"?>
<!--
  SceneFab 24×24 icons — 双色调 (cyan #06b6d4 + violet #a855f7 强调)
  设计原则:
  - viewBox 0 0 24 24 (与现有尺寸一致)
  - stroke-width 1.75 (从 2.0 降级, 更精致)
  - stroke-linecap="round" stroke-linejoin="round" (柔顺)
  - 主要结构 cyan, 强调色 violet (渐变或实色)
  - 24x24 实测: 笔触 ≥1.75 才清晰
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="brandCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- 多视频堆叠 (batch / multi-clip) - 主结构 cyan, 后帧 violet 半透明 -->
  <rect x="3" y="3" width="14" height="14" rx="2.5"
        stroke="url(#brandCyan)" stroke-width="1.75"/>
  <rect x="7" y="7" width="14" height="14" rx="2.5"
        stroke="#a855f7" stroke-width="1.5" opacity="0.45"/>
  <!-- Play 三角 (强调主帧) -->
  <path d="M 8 9 L 8 13 L 12 11 Z" fill="url(#brandCyan)"/>
</svg>