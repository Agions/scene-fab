<?xml version="1.0" encoding="UTF-8"?>
<!-- 导出 / 上传 (export / publish) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="brandCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- 盒子 (出口) -->
  <path d="M 21 15 V 19 A 2 2 0 0 1 19 21 H 5 A 2 2 0 0 1 3 19 V 15"
        stroke="url(#brandCyan)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 上传箭头 (主操作, cyan) -->
  <line x1="12" y1="3" x2="12" y2="15"
        stroke="url(#brandCyan)" stroke-width="1.75" stroke-linecap="round"/>
  <polyline points="7 8, 12 3, 17 8"
            stroke="url(#brandCyan)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 强调小点 (代表导出目的地) -->
  <circle cx="12" cy="18" r="1.5" fill="#a855f7" opacity="0.85"/>
</svg>