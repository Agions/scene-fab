<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 32 32"
     role="img"
     aria-label="SceneFab">
  <title>SceneFab</title>
  <defs>
    <linearGradient id="bgFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="brandFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="coreFav" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>

  <!-- 底板 -->
  <rect width="32" height="32" rx="7" fill="url(#bgFav)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5"
        fill="none" stroke="url(#brandFav)" stroke-width="0.5" opacity="0.3"/>

  <!-- 外环 (实线, 缩小场景只保留核心) -->
  <circle cx="16" cy="16" r="11" fill="none"
          stroke="url(#brandFav)" stroke-width="1" opacity="0.7"/>

  <!-- 中心圆盘 -->
  <circle cx="16" cy="16" r="7" fill="#050816"/>
  <circle cx="16" cy="16" r="7" fill="none"
          stroke="url(#brandFav)" stroke-width="0.6" opacity="0.55"/>

  <!-- Play 三角 (主识别符) -->
  <path d="M 14 12 L 21 16 L 14 20 Z" fill="url(#coreFav)"/>
</svg>